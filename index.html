<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://dijitalsavunma.com/sifre-olusturucu">
    <title>Yönlendiriliyor - Şifre Oluşturucu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #060609;
            color: #ede9e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .red {
            color: #d90000;
        }

        p {
            font-size: 1rem;
            line-height: 1.7;
            color: #7a7870;
            margin-bottom: 2rem;
        }

        a {
            display: inline-block;
            padding: 1rem 2rem;
            background: #d90000;
            color: white;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        a:hover {
            background: #ff1a1a;
        }

        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 2rem;
            border: 4px solid #13131c;
            border-top-color: #d90000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Şifre <span class="red">Oluşturucu</span></h1>
        <p>dijitalsavunma.com'a yönlendiriliyorsunuz...</p>
        <a href="https://dijitalsavunma.com/sifre-olusturucu">Şimdi Git</a>
    </div>
</body>
</html>
